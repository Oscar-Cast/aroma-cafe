<h1>Panel de Prueba - Aroma Café</h1>
<div id="productos-list"></div>

<script>
    async function cargarProductos() {
        const token = localStorage.getItem('token');
        
        const response = await fetch('/api/productos', {
            headers: {
                // Enviamos el token en el formato que espera tu backend
                'Authorization': `Bearer ${token}` 
            }
        });

        if (response.ok) {
            const productos = await response.json();
            document.getElementById('productos-list').innerText = JSON.stringify(productos, null, 2);
        } else {
            document.getElementById('productos-list').innerText = 'Error: No tienes acceso o el token expiró.';
        }
    }

    cargarProductos();
</script>
